<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#1a1a2e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8d5b0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4b896" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="eyeShine" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="200" rx="180" ry="180" fill="#1a1a2e" opacity="0.15"/>

  <!-- ============ EARS ============ -->
  <!-- Left ear -->
  <circle cx="95" cy="145" r="42" fill="#8B4513" stroke="#000" stroke-width="2.5"/>
  <circle cx="95" cy="145" r="22" fill="#6b3410" stroke="#000" stroke-width="1.5"/>
  <circle cx="95" cy="145" r="10" fill="#8B4513" opacity="0.5"/>
  <!-- Right ear -->
  <circle cx="305" cy="145" r="42" fill="#8B4513" stroke="#000" stroke-width="2.5"/>
  <circle cx="305" cy="145" r="22" fill="#6b3410" stroke="#000" stroke-width="1.5"/>
  <circle cx="305" cy="145" r="10" fill="#8B4513" opacity="0.5"/>

  <!-- ============ HEAD ============ -->
  <!-- Head shadow -->
  <ellipse cx="200" cy="205" rx="122" ry="132" fill="#6b3410" stroke="#000" stroke-width="3"/>
  <!-- Head main -->
  <ellipse cx="200" cy="200" rx="120" ry="130" fill="#8B4513" stroke="#000" stroke-width="2.5"/>

  <!-- Fur texture lines on forehead -->
  <line x1="175" y1="120" x2="185" y2="145" stroke="#6b3410" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="200" y1="115" x2="200" y2="140" stroke="#6b3410" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="225" y1="120" x2="215" y2="145" stroke="#6b3410" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- ============ FACE ============ -->
  <!-- Inner face -->
  <ellipse cx="200" cy="215" rx="82" ry="88" fill="url(#faceGrad)" stroke="#000" stroke-width="1.5" opacity="0.6"/>

  <!-- ============ EYES ============ -->
  <!-- Eye sockets -->
  <ellipse cx="150" cy="185" rx="28" ry="22" fill="#1a0a00" opacity="0.3"/>
  <ellipse cx="250" cy="185" rx="28" ry="22" fill="#1a0a00" opacity="0.3"/>
  
  <!-- Brow ridge -->
  <path d="M118 172 Q150 160 180 172" fill="none" stroke="#6b3410" stroke-width="4" stroke-linecap="round"/>
  <path d="M220 172 Q250 160 282 172" fill="none" stroke="#6b3410" stroke-width="4" stroke-linecap="round"/>

  <!-- Eye whites -->
  <ellipse cx="150" cy="188" rx="24" ry="20" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="250" cy="188" rx="24" ry="20" fill="#fff" stroke="#000" stroke-width="1.5"/>

  <!-- Iris -->
  <ellipse cx="152" cy="188" rx="14" ry="16" fill="url(#eyeShine)" stroke="#000" stroke-width="1.2"/>
  <ellipse cx="252" cy="188" rx="14" ry="16" fill="url(#eyeShine)" stroke="#000" stroke-width="1.2"/>

  <!-- Pupils -->
  <ellipse cx="152" cy="188" rx="7" ry="9" fill="#000"/>
  <ellipse cx="252" cy="188" rx="7" ry="9" fill="#000"/>

  <!-- Eye shine -->
  <ellipse cx="158" cy="182" rx="4" ry="3.5" fill="#fff" opacity="0.9"/>
  <ellipse cx="258" cy="182" rx="4" ry="3.5" fill="#fff" opacity="0.9"/>
  <circle cx="146" cy="193" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="246" cy="193" r="2" fill="#fff" opacity="0.5"/>

  <!-- ============ NOSE ============ -->
  <!-- Wide ape nose -->
  <ellipse cx="200" cy="218" rx="14" ry="9" fill="#000" opacity="0.2"/>
  <ellipse cx="194" cy="217" rx="5" ry="4" fill="#000" opacity="0.35"/>
  <ellipse cx="206" cy="217" rx="5" ry="4" fill="#000" opacity="0.35"/>
  <!-- Nostrils -->
  <ellipse cx="194" cy="219" rx="2.5" ry="2" fill="#000" opacity="0.5"/>
  <ellipse cx="206" cy="219" rx="2.5" ry="2" fill="#000" opacity="0.5"/>
  <!-- Nose bridge -->
  <line x1="200" y1="208" x2="200" y2="215" stroke="#000" stroke-width="1.5" opacity="0.15"/>

  <!-- ============ MOUTH ============ -->
  <path d="M160 255 Q200 280 240 255" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
     <rect x="175" y="255" width="50" height="12" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
     <line x1="200" y1="255" x2="200" y2="267" stroke="#000" stroke-width="1"/>

  <!-- ============ HAT ============ -->
  <g transform="translate(200, 98)">
      <path d="M-58 2 Q-60 -30 -40 -42 Q0 -52 40 -42 Q60 -30 58 2 Z" fill="#2ecc71" stroke="#000" stroke-width="2"/>
      <rect x="-60" y="0" width="120" height="8" rx="4" fill="#2ecc71" stroke="#000" stroke-width="1.5"/>
      <rect x="-50" y="-20" width="100" height="3" rx="1" fill="#000" opacity="0.2"/>
      <path d="M55 0 Q65 -5 60 -15 Q55 -8 50 -5" fill="#2ecc71" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
    </g>

  <!-- Chin shadow -->
  <path d="M160 280 Q200 295 240 280" fill="none" stroke="#000" stroke-width="1.5" opacity="0.15"/>

  <!-- Badge -->
  <text x="200" y="385" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff" opacity="0.2" letter-spacing="3">NOX APE</text>
</svg>